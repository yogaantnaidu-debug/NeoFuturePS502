{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Health Assistant</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body style="background:#f4f4f4; font-family:Arial;">

<div style="max-width:600px; margin:50px auto; background:white; padding:20px; border-radius:15px; box-shadow:0 0 10px rgba(0,0,0,0.1);">

    <h2 style="text-align:center;">Health Assistant</h2>

    <div id="chat-box-area" style="height:400px; overflow-y:auto; padding:10px; background:#f9f9f9; border-radius:10px;">

        {% for chat in chats %}
        
            <!-- USER MESSAGE -->
            <div style="text-align:right; margin:10px 0;">
                <div style="display:inline-block; background:#8b1538; color:white; padding:10px 15px; border-radius:15px;">
                    {{ chat.message }}
                </div>
            </div>

            <!-- AI MESSAGE -->
            <div style="text-align:left; margin:10px 0;">
                <div style="display:inline-block; background:#e5e5e5; padding:10px 15px; border-radius:15px;">
                    {{ chat.response|linebreaks }}
                </div>
            </div>

        {% endfor %}

    </div>

    <form method="POST" style="margin-top:10px; display:flex;">
        {% csrf_token %}
        <input type="text" name="message" placeholder="Ask health question..." style="flex:1; padding:10px; border-radius:20px; border:1px solid #ccc;">
        <button type="submit" style="margin-left:10px; padding:10px 20px; background:#8b1538; color:white; border:none; border-radius:20px;">Send</button>
    </form>

</div>

</body>
</html>
